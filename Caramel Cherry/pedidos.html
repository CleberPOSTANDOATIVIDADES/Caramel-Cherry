<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pedidos - Caramel Cherry</title>

    <link rel="stylesheet" href="home.css">

</head>

<body>

<header class="cabecalho">

    <div class="logo">

        <img src="Design sem nome.png" alt="Logo">

    </div>

    <nav class="menu">

        <a class="inicio" href="home.html">
            Página Inicial
        </a>

        <a href="produtos.html">
            Produtos
        </a>

        <a href="quem-somos.html">
            Quem Somos
        </a>

        <a href="contato.html">
            Contato
        </a>

        <a href="cadastro.html">
            Cadastro
        </a>

    </nav>

    <div class="carrinho">

        <a href="pedidos.html">
            Carrinho
        </a>

    </div>

</header>

<main>


<section class="carrinho-pagina">

    <h1>Meu Carrinho</h1>

    <div class="carrinho-conteudo">

        <div class="cherry-card">

            <img src="Min Cherry.jpeg" alt="Mascote Cherry">

            <h2>Cherry</h2>

            <p>

                Obrigada por comprar conosco!
                Esperamos que seus materiais inspirem
                muitas obras incríveis.

            </p>

        </div>

        <div class="pedido-area">

            <div class="pedido">

                <div class="pedido-imagem">

                    <img src="Kit Aquarela 6 Pinceis.png" alt="Kit">

                </div>

                <div class="pedido-info">

                    <h2>Kit Aquarela - 6 Pincéis</h2>

                    <p>Preço: <strong>R$ 49,99</strong></p>

                    <label for="quantidade">Quantidade</label>

                    <input
                        id="quantidade"
                        type="number"
                        value="1"
                        min="1">

                    <h3>Subtotal: R$ 49,99</h3>

                </div>

            </div>

            <div class="resumo">

                <h2>Total</h2>

                <h1>R$ 49,99</h1>

                <a href="#">

                    Finalizar Compra

                </a>

            </div>

        </div>

    </div>

</section>

</main>

<footer>

    <div class="redes esquerda">
        <img src="instagram.jpg" alt="Instagram">
        <img src="whatsapp.jpg" alt="WhatsApp">
    </div>

    <h2>Caramel Cherry</h2>

    <div class="redes direita">
        <img src="twitter.jpg" alt="Twitter">
        <img src="tiktok.jpg" alt="TikTok">
    </div>

</footer>

</body>

</html>
